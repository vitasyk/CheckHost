services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkhost-app
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-checkhost}?schema=public
    networks:
      - checkhost-net
    volumes:
      - ./data:/app/data
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: checkhost-db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-checkhost}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-checkhost}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - checkhost-net

  caddy:
    image: caddy:latest
    container_name: checkhost-caddy
    restart: always
    env_file:
      - .env
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - checkhost-net
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: checkhost-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - checkhost-net

networks:
  checkhost-net:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  redis_data:
