# План впровадження - Пошук за номером автономної системи (AS)

Цей план описує кроки, необхідні для додавання можливості пошуку за номером AS (наприклад, `AS13335`) безпосередньо в існуюче поле пошуку доменів/IP, забезпечуючи безшовну інтеграцію з поточним UI/UX.

## Заплановані зміни

### 1. Frontend: Поле пошуку та валідація
#### [MODIFY] [src/components/checks/CheckForm.tsx](file:///c:/Users/VITASYK/CheckHost/src/components/checks/CheckForm.tsx)
- **Placeholder**: Оновити `getPlaceholder()` для типу `info`, щоб включити приклад AS (наприклад, `"example.com, 1.1.1.1 або AS13335"`).
- **Sanitization**: Оновити `sanitizeInput`, щоб забезпечити правильну обробку префіксів `AS`. Він повинен нормалізувати введення на кшталт `as 13335` або `13335` у стандартний формат `AS13335`, якщо це необхідно.

### 2. Типи та структури даних
#### [MODIFY] [src/types/ip-info.ts](file:///c:/Users/VITASYK/CheckHost/src/types/ip-info.ts)
- Розширити інтерфейс `IpInfoResponse`, додавши прапор `isASN: boolean`.
- Додати опціональний об'єкт `asnDetails` для зберігання специфічних даних автономної системи (наприклад, `name`, `domain`, `allocated_prefixes`, `registry`, `country`).

### 3. Backend: Логіка API та отримання даних
#### [MODIFY] [src/lib/mock-data.ts](file:///c:/Users/VITASYK/CheckHost/src/lib/mock-data.ts)
- Додати логіку детектування на початку `getMockIpInfo(host)`: `const isASN = /^AS\d+$/i.test(host);`
- Якщо `isASN` істинно:
  - Пропустити стандартне вирішення IP (`resolveHostToIp`).
  - Пропустити API геопозиціонування, які потребують IP (наприклад, IP-API, MaxMind).
  - Отримати дані саме для AS. Наприклад, `ipinfo.io` надає ендпоінт для запитів AS: `https://ipinfo.io/${host}/json`.
  - Сформувати відповідь відповідно до структури `IpInfoResponse`, вставивши дані організації AS в об'єкт `providers`, щоб UI міг їх відобразити.

#### [MODIFY] [src/lib/ipinfo-api.ts](file:///c:/Users/VITASYK/CheckHost/src/lib/ipinfo-api.ts)
- Реалізувати нову допоміжну функцію `fetchAsnInfo(asn: string)`, яка запитує API `ipinfo.io` (або RDAP) спеціально для номерів AS.

### 4. UI/UX: Відображення результатів
#### [MODIFY] [src/components/ip-info/IpInfoResult.tsx](file:///c:/Users/VITASYK/CheckHost/src/components/ip-info/IpInfoResult.tsx)
- Визначити, чи є отримані дані результатом для ASN (`data.isASN`).
- **Секція заголовку**: Замість "Target IP" відображати "Target ASN". Виділити назву організації AS.
- **Бейджі**: Скоригувати бейджі швидкої інформації (VPN/Proxy/Hosting), оскільки вони не стосуються всієї AS у той самий спосіб. Замість цього показувати бейджі на кшталт "Реєстр: ARIN" або "Всього IP".
- **Картки провайдерів**: Адаптувати картки провайдерів для відображення полів, специфічних для AS (наприклад, кількість виділених префіксів, реєстр, домен організації).
- **Секція карти**: Якщо `showFeaturedMap` увімкнено, карта повинна перемикатися на країну реєстрації AS або плавно приховуватися/замінюватися ілюстрацією топології мережі, якщо координати недоступні.

## План перевірки
1. Ввести валідний номер AS, наприклад `AS13335` (Cloudflare), у головний рядок пошуку на вкладці "Info".
2. Переконатися, що UI бездоганно переходить до результатів без помилок вирішення.
3. Перевірити, чи заголовок, картки та дані RDAP відображають деталі організації AS у преміальному скляному дизайні.
